<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>FTL Save State Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            color: #fff;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
        }

        .toolbar-top {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 5px;
        }

        .toolbar-bottom {
            display: flex;
            align-items: center;
        }

        #current-states-path {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .toolbar button {
            background: #333;
            font-size: 0.85rem;
            padding: 6px 12px;
        }

        .toolbar button:hover {
            background: #444;
        }

        .toolbar .sync-btn {
            background: #2e7d32;
        }

        .toolbar .sync-btn:hover {
            background: #388e3c;
        }

        #current-states-path {
            font-size: 0.7rem;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .section {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .section h2 {
            font-size: 1rem;
            margin-top: 0;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            flex-grow: 1;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #007bff;
        }

        .state-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .state-item {
            background: #252525;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 4px solid #444;
            cursor: pointer;
            transition: background 0.2s;
            overflow: hidden;
        }

        .state-item.active {
            border-left-color: #007bff;
            background: #2a2a2a;
        }

        .state-item:hover {
            background: #2a2a2a;
        }

        .state-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
        }

        .state-info {
            display: flex;
            flex-direction: column;
        }

        .state-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .state-meta {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 2px;
        }

        .state-date {
            font-size: 0.7rem;
            color: #666;
        }

        .active-label {
            font-size: 0.65rem;
            background: #007bff;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .state-menu {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }

        .state-menu-inner {
            overflow: hidden;
            display: flex;
            gap: 8px;
            padding: 0 10px;
            transition: padding 0.3s ease-out;
        }

        .state-item.expanded .state-menu {
            grid-template-rows: 1fr;
        }

        .state-item.expanded .state-menu-inner {
            padding: 10px;
        }

        button {
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            color: white;
        }

        .btn-primary {
            background: #1976d2;
        }

        .btn-primary:hover {
            background: #1565c0;
        }

        .btn-update {
            background: #ef6c00;
        }

        .btn-update:hover {
            background: #e65100;
        }

        .btn-danger {
            background: #c62828;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
            border: 2px solid #121212;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
            margin-left: 10px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2e7d32;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <div id="update-banner"
        style="display: none; background: #2a475e; color: white; padding: 10px; text-align: center; font-size: 0.9rem; border-bottom: 2px solid #66c0f4;">
        <span id="update-text">An update is available! Downloading...</span>
        <button id="update-btn"
            style="display: none; margin-left: 15px; background: #66c0f4; color: black; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;"
            onclick="quitAndInstall()">Restart to Update</button>
    </div>
    <h1>FTL Save State Manager</h1>

    <div class="toolbar">
        <div class="toolbar-top">
            <button onclick="openSaveFolder()">FTL Folder</button>
            <button onclick="selectStatesFolder()">Change States Folder</button>
            <button class="sync-btn" onclick="updateList()">Refresh (Sync)</button>
            <div style="margin-left: auto; display: flex; align-items: center; font-size: 0.85rem; color: #bbb;">
                Auto-Backup (5m)
                <label class="switch">
                    <input type="checkbox" id="auto-backup-toggle" onchange="toggleAutoBackup()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="toolbar-bottom">
            <span id="current-states-path" style="font-size: 0.75rem; color: #888;"></span>
            <a href="#" onclick="resetStatesPath()"
                style="font-size: 0.75rem; color: #555; margin-left: 10px; text-decoration: none;">Reset to Default</a>
        </div>
    </div>

    <div class="section">
        <h2>Save States</h2>
        <div class="controls">
            <input type="text" id="run-name" placeholder="Name your state">
            <button class="btn-primary" onclick="createState('run')">New Run State</button>
            <button class="btn-primary" onclick="createState('profile')">New Profile State</button>
        </div>
        <ul id="state-list" class="state-list"></ul>
    </div>

    <div id="version-tag" title="Up to date"
        style="position: fixed; bottom: 10px; right: 10px; font-size: 0.7rem; color: #555; cursor: help; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px;">
        v1.4.7
    </div>
    <script>
        const { ipcRenderer } = require('electron');

        let expandedState = null;

        async function updateList() {
            const list = document.getElementById('state-list');
            const states = await ipcRenderer.invoke('get-states');
            const activeName = await ipcRenderer.invoke('get-active-state');

            list.innerHTML = '';
            states.forEach(state => {
                const isActive = state.name === activeName;
                const isExpanded = state.name === expandedState;

                const li = document.createElement('li');
                li.className = `state-item ${isActive ? 'active' : ''} ${isExpanded ? 'expanded' : ''}`;
                const dateStr = new Date(state.ctime).toLocaleString();

                let infoText = '';
                if (state.info) {
                    const shipType = state.info.shipType.replace('PLAYER_SHIP_', '').replace(/_/g, ' ');
                    infoText = `<span class="state-meta">${state.info.shipName} [${shipType}] - Sector ${state.info.sector}</span>`;
                }

                li.innerHTML = `
                    <div class="state-header" onclick="toggleExpand('${state.name}')">
                        <div class="state-info">
                            <div style="display: flex; align-items: center;">
                                <span class="state-name">${state.name}</span>
                                ${isActive ? '<span class="active-label">Active</span>' : ''}
                            </div>
                            ${infoText}
                            <span class="state-date">${dateStr}</span>
                        </div>
                        <span style="font-size: 0.8rem; color: #555;">${isExpanded ? '▲' : '▼'}</span>
                    </div>
                    <div class="state-menu">
                        <div class="state-menu-inner">
                            <button class="btn-primary" onclick="loadState('${state.name}')">Load State</button>
                            <button class="btn-update" onclick="updateExistingState('${state.name}')">Update (Save Here)</button>
                            <button class="btn-danger" onclick="deleteState('${state.name}')">Delete</button>
                        </div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function toggleExpand(name) {
            expandedState = expandedState === name ? null : name;
            updateList();
        }

        async function createState(type, nameOverride) {
            const input = document.getElementById('run-name');
            const name = nameOverride || input.value.trim();
            if (!name) return;
            const result = await ipcRenderer.invoke('create-state', name, type);
            if (!result.success) {
                if (!nameOverride) alert(`Error: ${result.error}`);
            } else {
                if (!nameOverride) input.value = '';
                expandedState = name;
                updateList();
            }
        }

        async function loadState(name) {
            const isRunning = await ipcRenderer.invoke('is-ftl-running');
            const msg = isRunning
                ? `WARNING: FTL is currently running! \n\nAre you sure you want to LOAD state "${name}"?`
                : `Are you sure you want to LOAD state "${name}"? This will overwrite your current save.`;

            if (confirm(msg)) {
                await ipcRenderer.invoke('load-state', name);
                setTimeout(updateList, 100);
            }
        }

        async function updateExistingState(name) {
            if (confirm(`Overwrite "${name}" with your CURRENT game progress?`)) {
                const result = await ipcRenderer.invoke('create-state', name, 'run');
                if (!result.success) {
                    alert(`Error: ${result.error}`);
                } else {
                    updateList();
                }
            }
        }

        async function deleteState(name) {
            if (confirm(`Delete state "${name}"?`)) {
                await ipcRenderer.invoke('delete-state', name);
                if (expandedState === name) expandedState = null;
                updateList();
            }
        }

        async function openSaveFolder() { await ipcRenderer.invoke('open-save-folder'); }

        async function selectStatesFolder() {
            const newPath = await ipcRenderer.invoke('select-states-folder');
            if (newPath) { updatePathDisplay(); updateList(); }
        }

        async function resetStatesPath() {
            if (confirm("Reset Save States folder to default local location?")) {
                await ipcRenderer.invoke('reset-states-path');
                updatePathDisplay();
                updateList();
            }
        }

        async function updatePathDisplay() {
            const path = await ipcRenderer.invoke('get-current-states-path');
            document.getElementById('current-states-path').innerText = `States Folder: ${path || 'Not Set'}`;
        }

        async function toggleAutoBackup() {
            const enabled = document.getElementById('auto-backup-toggle').checked;
            await ipcRenderer.invoke('update-settings', { autoBackup: enabled });
        }

        async function init() {
            const settings = await ipcRenderer.invoke('get-settings');
            document.getElementById('auto-backup-toggle').checked = settings.autoBackup;
            updateList();
            updatePathDisplay();
        }

        ipcRenderer.on('update-available', () => {
            document.getElementById('update-banner').style.display = 'block';
            document.getElementById('version-tag').innerText = 'v1.4.7 (Update Available)';
            document.getElementById('version-tag').title = 'An update is being downloaded...';
            document.getElementById('version-tag').style.color = '#66c0f4';
        });

        ipcRenderer.on('update-ready', () => {
            document.getElementById('update-text').innerText = 'Update downloaded and ready!';
            document.getElementById('update-btn').style.display = 'inline-block';
            document.getElementById('version-tag').innerText = 'v1.4.7 (Ready to Install)';
            document.getElementById('version-tag').title = 'Click the blue button above to restart and update!';
        });

        function quitAndInstall() {
            ipcRenderer.send('quit-and-install');
        }

        init();

        setInterval(updateList, 30000);

        setInterval(async () => {
            const settings = await ipcRenderer.invoke('get-settings');
            if (settings.autoBackup) {
                await createState('run', 'Auto-Backup');
            }
        }, 300000); // 5 minutes
    </script>
</body>

</html>
